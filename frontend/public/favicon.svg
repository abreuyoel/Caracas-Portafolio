<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="up" x1="0%" y1="1" x2="0%" y2="0">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="dn" x1="0%" y1="0" x2="0%" y2="1">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4c62ff"/>
      <stop offset="100%" style="stop-color:#00e5c3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <line x1="8" y1="48" x2="56" y2="48" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <line x1="8" y1="38" x2="56" y2="38" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <line x1="8" y1="28" x2="56" y2="28" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <line x1="8" y1="18" x2="56" y2="18" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <!-- Candle 1: bearish (red) -->
  <line x1="16" y1="16" x2="16" y2="22" stroke="url(#dn)" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="13" y="22" width="6" height="12" rx="1.5" fill="url(#dn)"/>
  <line x1="16" y1="34" x2="16" y2="40" stroke="url(#dn)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candle 2: bullish (green) -->
  <line x1="28" y1="20" x2="28" y2="25" stroke="url(#up)" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="25" y="25" width="6" height="14" rx="1.5" fill="url(#up)"/>
  <line x1="28" y1="39" x2="28" y2="46" stroke="url(#up)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candle 3: bullish (green, tall) -->
  <line x1="40" y1="12" x2="40" y2="18" stroke="url(#up)" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="37" y="18" width="6" height="16" rx="1.5" fill="url(#up)"/>
  <line x1="40" y1="34" x2="40" y2="42" stroke="url(#up)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candle 4: bearish small -->
  <line x1="52" y1="14" x2="52" y2="18" stroke="url(#dn)" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="49" y="18" width="6" height="9" rx="1.5" fill="url(#dn)"/>
  <line x1="52" y1="27" x2="52" y2="32" stroke="url(#dn)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Trend line -->
  <polyline points="16,34 28,30 40,22 52,18" stroke="url(#line)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Glow dot at end -->
  <circle cx="52" cy="18" r="3" fill="#00e5c3" opacity="0.5"/>
  <circle cx="52" cy="18" r="1.5" fill="#00e5c3"/>
  <!-- Bottom text "CP" -->
  <text x="32" y="58" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="8" font-weight="800" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">CP</text>
</svg>
