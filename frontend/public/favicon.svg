<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c62ff"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Candlestick chart -->
  <!-- Candle 1 (bearish, red) -->
  <line x1="13" y1="14" x2="13" y2="20" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="10" y="20" width="6" height="10" rx="1" fill="#ef4444"/>
  <line x1="13" y1="30" x2="13" y2="36" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Candle 2 (bullish, green) -->
  <line x1="25" y1="18" x2="25" y2="24" stroke="#10b981" stroke-width="1.5"/>
  <rect x="22" y="24" width="6" height="12" rx="1" fill="#10b981"/>
  <line x1="25" y1="36" x2="25" y2="42" stroke="#10b981" stroke-width="1.5"/>
  <!-- Candle 3 (bullish, green) -->
  <line x1="37" y1="12" x2="37" y2="17" stroke="#10b981" stroke-width="1.5"/>
  <rect x="34" y="17" width="6" height="14" rx="1" fill="#10b981"/>
  <line x1="37" y1="31" x2="37" y2="38" stroke="#10b981" stroke-width="1.5"/>
  <!-- Candle 4 (bearish smaller) -->
  <line x1="49" y1="10" x2="49" y2="15" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="46" y="15" width="6" height="8" rx="1" fill="#ef4444"/>
  <line x1="49" y1="23" x2="49" y2="28" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Trend line -->
  <polyline points="13,42 25,36 37,28 49,20" stroke="url(#accent)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Bottom label "CP" -->
  <text x="32" y="58" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" font-weight="700" fill="#4c62ff" text-anchor="middle" letter-spacing="1">CP</text>
</svg>
